<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard — Cirqle</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400..800&family=Sora:wght@400..800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="assets/cirqle.css" />
  <style>
    /* Receipt status chip: amber = pending, green = verified */
    :root { --tile-pending: #E6892B; --tile-done: #2E9E5A; }

    /* Logged-in nav (matches dashboard.html) */
    .nav-user { display: flex; align-items: center; gap: 10px; }
    .nav-avatar {
      width: 38px; height: 38px; border-radius: 50%;
      border: var(--bw) solid var(--ink); background: var(--pink);
      display: flex; align-items: center; justify-content: center;
      font-family: var(--font-display); font-weight: 800; font-size: .95rem;
      box-shadow: var(--shadow-sm);
    }
    .nav-name { font-size: .88rem; font-weight: 700; }

    .feed-wrap { position: relative; z-index: 1; max-width: 960px; margin: 0 auto; padding: clamp(32px,5vw,56px) clamp(20px,4vw,44px) 90px; }
    .feed-head { display: flex; align-items: flex-end; justify-content: space-between; gap: 20px; flex-wrap: wrap; }
    .feed-title { font-family: var(--font-display); font-weight: 800; font-size: clamp(1.9rem,4vw,2.9rem); letter-spacing: -0.03em; line-height: 1.05; }
    .feed-sub { font-size: .95rem; color: var(--ink-soft); font-weight: 500; margin: 6px 0 0; }
    .feed-meta { margin: 16px 0 28px; min-height: 18px; }
    .feed-updated { font-size: .78rem; font-weight: 600; color: var(--ink-soft); }

    .feed-input {
      background: var(--card); border: var(--bw) solid var(--ink); border-radius: var(--r-chip);
      padding: 11px 18px; font-size: .9rem; font-weight: 600; font-family: var(--font-body);
      color: var(--ink); outline: none; box-shadow: var(--shadow-sm);
    }

    .feed-list { display: grid; grid-template-columns: 1fr; gap: 20px; }

    /* Large horizontal post tile: image left, details right */
    .post-tile {
      display: flex; align-items: stretch;
      background: var(--card);
      border: var(--bw) solid var(--ink);
      border-radius: var(--r-card);
      box-shadow: var(--shadow);
      overflow: hidden;
      transition: transform .22s var(--bounce), box-shadow .22s var(--bounce);
    }
    .post-tile:hover { transform: translate(-3px,-3px); box-shadow: var(--shadow-lg); }
    .post-img { flex-shrink: 0; width: 210px; background: var(--paper-deep); border-right: var(--bw) solid var(--ink); overflow: hidden; }
    .post-img img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .post-img .noimg { width: 100%; height: 100%; min-height: 180px; display: flex; align-items: center; justify-content: center; font-size: .95rem; font-weight: 700; color: var(--ink-soft); }
    .post-body { flex: 1; min-width: 0; padding: 20px 22px; display: flex; flex-direction: column; gap: 10px; }
    .post-owner { font-family: var(--font-display); font-weight: 800; font-size: 1.05rem; letter-spacing: -0.01em; }
    .post-tags { font-size: .82rem; font-weight: 800; color: var(--blue-deep); margin-top: 2px; }
    .post-caption { font-size: .88rem; color: var(--ink-soft); line-height: 1.55; display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; }
    .post-meta { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
    .post-date { font-size: .72rem; font-weight: 700; color: var(--ink-soft); }

    /* Countdown chips (campaign end + 3-day cashback payout) */
    .post-timers { display: flex; flex-direction: column; gap: 6px; align-items: flex-start; margin-top: auto; }
    .timer-chip {
      display: inline-flex; align-items: center; gap: 6px;
      font-size: .74rem; font-weight: 800;
      padding: 5px 12px;
      border: var(--bw) solid var(--ink); border-radius: var(--r-chip);
      background: var(--blue-pale);
    }
    .timer-chip.cash { background: var(--blue); color: #fff; }

    /* Right-side action rail: status icon + Upload Receipt + IG link */
    .post-actions {
      flex-shrink: 0; width: 194px;
      border-left: var(--bw) dashed rgba(31,27,19,.2);
      padding: 20px; display: flex; flex-direction: column; gap: 12px; justify-content: center;
    }
    .post-actions .btn { width: 100%; }
    .tile-status {
      display: inline-flex; align-items: center; justify-content: center; gap: 7px;
      font-size: .76rem; font-weight: 800;
      padding: 8px 12px;
      border: var(--bw) solid var(--ink); border-radius: var(--r-chip);
      background: var(--tile-pending); color: var(--ink);
    }
    .tile-status.done { background: var(--tile-done); color: #fff; }

    .feed-empty { text-align: center; padding: 60px 20px; }
    .feed-empty .ei { font-size: 3rem; margin-bottom: 12px; }
    .feed-empty .et { font-family: var(--font-display); font-weight: 800; font-size: 1.35rem; margin-bottom: 6px; }
    .feed-empty .es { font-size: .9rem; color: var(--ink-soft); }

    @media (max-width: 900px) { .nav-name { display: none; } }
    @media (max-width: 700px) {
      .post-tile { flex-direction: column; }
      .post-img { width: 100%; height: 200px; border-right: none; border-bottom: var(--bw) solid var(--ink); }
      .post-actions {
        width: 100%; border-left: none; border-top: var(--bw) dashed rgba(31,27,19,.2);
        flex-direction: row; flex-wrap: wrap; justify-content: flex-start;
      }
      .post-actions .btn { width: auto; flex: 1 1 auto; }
      .tile-status { flex: 1 1 100%; }
    }
  </style>
</head>
<body>

  <nav class="nav">
    <a href="index.html" class="logo">cirqle</a>
    <div class="nav-cta">
      <div class="nav-user">
        <span class="nav-avatar" id="navAvatar">?</span>
        <span class="nav-name" id="navName">Loading…</span>
      </div>
      <a href="dashboard.html" class="btn btn-sm">My Account</a>
      <a href="browse.html" class="btn btn-sm">Browse deals</a>
      <button class="btn btn-sm" onclick="signOut()">Sign out</button>
    </div>
  </nav>

  <div class="feed-wrap">
    <div class="feed-head">
      <div>
        <div class="feed-title fade-up d1">Your Cirqle posts</div>
        <p class="feed-sub fade-up d2">Instagram posts where you tagged <strong>@cirqle</strong> and the brand.</p>
      </div>
      <button class="btn btn-ink fade-up d2" id="refreshBtn">↻ Refresh</button>
    </div>
    <div class="feed-meta"><span class="feed-updated" id="feedUpdated"></span></div>
    <div class="feed-list" id="feedList"></div>
  </div>

  <script src="assets/api.js"></script>
  <script src="assets/ig-account.js"></script>
  <script>
    // ── Auth guard ──
    const session = JSON.parse(localStorage.getItem('cirqle_session') || sessionStorage.getItem('cirqle_session') || 'null');
    if (!session) { window.location.href = 'signin.html'; }
    else {
      document.getElementById('navName').textContent = session.firstName + ' ' + session.lastName;
      document.getElementById('navAvatar').textContent = session.firstName[0].toUpperCase();
    }

    const listEl = document.getElementById('feedList');
    const updatedEl = document.getElementById('feedUpdated');
    let allMentions = [];   // full cirqle mentions list currently loaded

    // ── Helpers ──
    function esc(s) {
      return (s || '').replace(/[&<>"']/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]));
    }
    function fmtDate(ts) {
      if (!ts) return '';
      const d = new Date(ts);
      return isNaN(d) ? '' : d.toLocaleDateString('en-GB', { day: 'numeric', month: 'short', year: 'numeric' });
    }
    function imgFail(img) {
      const d = document.createElement('div');
      d.className = 'noimg'; d.textContent = 'No image';
      if (img.parentNode) img.parentNode.replaceChild(d, img);
    }

    // ── Timing rules ──
    const DAY_MS = 86400000, HOUR_MS = 3600000;
    const CASHBACK_DAYS = 3;    // post stays up 3 days, then cashback auto-sends

    function fmtCashback(deadline) {
      const diff = deadline - Date.now();
      if (diff <= 0) return 'Cashback sent';
      const totalHours = Math.floor(diff / HOUR_MS);
      const days = Math.floor(totalHours / 24);
      const hours = totalHours % 24;
      if (days > 0) return 'Cashback in ' + days + 'd ' + hours + 'hr';
      if (hours > 0) return 'Cashback in ' + hours + 'hr';
      return 'Cashback in ' + Math.max(1, Math.floor(diff / 60000)) + 'min';
    }
    // Refresh every countdown chip in place (called on render + once a minute).
    function tickCountdowns() {
      document.querySelectorAll('.timer-chip[data-deadline]').forEach(el => {
        el.textContent = fmtCashback(+el.dataset.deadline);
      });
    }
    setInterval(tickCountdowns, 60000);

    // ── Receipt completion state (set by receipt.html, keyed by post id) ──
    function receiptsMap() {
      try { return JSON.parse(localStorage.getItem('cirqle_receipts') || '{}'); }
      catch (e) { return {}; }
    }
    function hasReceipt(id) { return !!receiptsMap()[id]; }

    // ── Render ──
    function renderPosts(posts) {
      if (!posts.length) {
        listEl.innerHTML =
          '<div class="feed-empty">' +
            '<div class="et">No posts yet</div>' +
            '<div class="es">Tag both <strong>@cirqle</strong> and the brand you bought from in an Instagram post, then hit Refresh.</div>' +
          '</div>';
        return;
      }
      listEl.innerHTML = posts.map(p => {
        const img = p.displayUrl
          ? '<img src="' + esc(p.displayUrl) + '" alt="Instagram post" loading="lazy" onerror="imgFail(this)" />'
          : '<div class="noimg">No image</div>';
        const caption = esc((p.caption || '').replace(/\s+/g, ' ').trim()) || '<em>No caption</em>';

        // Cashback countdown (3-day payout hold), derived from the post date.
        const postMs = new Date(p.timestamp).getTime();
        let timers = '';
        if (!isNaN(postMs)) {
          const cashbackEnd = postMs + CASHBACK_DAYS * DAY_MS;
          timers =
            '<div class="post-timers">' +
              '<span class="timer-chip cash" data-deadline="' + cashbackEnd + '">' + fmtCashback(cashbackEnd) + '</span>' +
            '</div>';
        }

        // Receipt state: flips the tile's status chip + border once verified.
        const done = hasReceipt(p.id);
        const status = done
          ? '<span class="tile-status done">Receipt verified</span>'
          : '<span class="tile-status">Receipt pending</span>';

        return (
          '<article class="post-tile">' +
            '<div class="post-img">' + img + '</div>' +
            '<div class="post-body">' +
              '<div>' +
                '<div class="post-owner">' + esc(p.ownerFullName || p.ownerUsername || 'Unknown') + '</div>' +
                '<div class="post-tags">@cirqle @brand</div>' +
              '</div>' +
              '<div class="post-caption">' + caption + '</div>' +
              timers +
              '<div class="post-meta">' +
                '<span class="chip">' + (p.likesCount || 0) + ' likes</span>' +
                '<span class="chip">' + (p.commentsCount || 0) + ' comments</span>' +
                '<span class="post-date">' + fmtDate(p.timestamp) + '</span>' +
              '</div>' +
            '</div>' +
            '<div class="post-actions">' +
              status +
              (done ? '' : '<a class="btn btn-lime btn-sm" href="receipt.html?id=' + encodeURIComponent(p.id || '') + '">Upload Receipt</a>') +
              (p.url ? '<a href="' + esc(p.url) + '" target="_blank" rel="noopener" class="btn btn-sm">View on Instagram →</a>' : '') +
            '</div>' +
          '</article>'
        );
      }).join('');
      tickCountdowns();
    }

    function filterByHandle(all, handle) {
      return all.filter(p => (p.ownerUsername || '').toLowerCase() === handle);
    }

    // Show the user only their own tagged posts. If no handle stored, prompt for it.
    function applyAndRender() {
      const handle = window.CirqleAccount.getHandle();
      if (!handle) { promptForHandle(); return; }
      renderPosts(filterByHandle(allMentions, handle));
    }

    // ── Load: the server is the source of truth (each user's stored posts).
    // localStorage is only an offline fallback for instant paint if it's down. ──
    async function loadMentions() {
      try {
        const res = await fetch(`${window.CIRQLE_API_BASE}/feed`, {
          headers: { 'Authorization': 'Bearer ' + session.token }
        });
        if (res.status === 401) { signOut(); return; }
        if (res.ok) {
          const data = await res.json();
          allMentions = Array.isArray(data.posts) ? data.posts : [];
          localStorage.setItem('cirqle_mentions', JSON.stringify({ posts: allMentions, updated: data.updated }));
          updatedEl.textContent = data.updated
            ? 'Last updated ' + fmtDate(data.updated)
            : 'Hit Refresh to load your posts';
          applyAndRender();
          return;
        }
      } catch (e) { /* offline — fall back to the browser cache below */ }

      const cached = localStorage.getItem('cirqle_mentions');
      if (cached) {
        try {
          const obj = JSON.parse(cached);
          allMentions = obj.posts || [];
          updatedEl.textContent = (obj.updated ? 'Last updated ' + fmtDate(obj.updated) + ' ' : '') + '(offline)';
        } catch (e) { allMentions = []; }
      } else {
        allMentions = [];
        updatedEl.textContent = 'Could not reach the server — try again';
      }
      applyAndRender();
    }

    // ── Live refresh: our backend scrapes server-side (token stays on the server)
    // and returns only THIS user's tagged posts, keyed off their login token. ──
    async function refresh() {
      const btn = document.getElementById('refreshBtn');
      const label = btn.textContent;
      btn.disabled = true;
      btn.textContent = 'Refreshing…';
      try {
        const res = await fetch(`${window.CIRQLE_API_BASE}/feed/refresh`, {
          method: 'POST',
          headers: { 'Authorization': 'Bearer ' + session.token }
        });
        if (res.status === 401) { signOut(); return; }
        if (!res.ok) {
          let msg = 'HTTP ' + res.status;
          try { msg = (await res.json()).detail || msg; } catch (e) { /* keep msg */ }
          throw new Error(msg);
        }
        const data = await res.json();
        allMentions = Array.isArray(data.posts) ? data.posts : [];
        const now = data.updated || new Date().toISOString();
        localStorage.setItem('cirqle_mentions', JSON.stringify({ posts: allMentions, updated: now }));
        updatedEl.textContent = 'Last updated ' + fmtDate(now);
        applyAndRender();
        cirqleToast('Refreshed — ' + allMentions.length + ' of your posts found');
      } catch (e) {
        console.error('Refresh failed:', e);
        cirqleToast('Refresh failed: ' + e.message);
      } finally {
        btn.disabled = false;
        btn.textContent = label;
      }
    }

    // ── Fallback: ask for the handle inline (accounts created before this feature) ──
    function promptForHandle() {
      listEl.innerHTML =
        '<div class="feed-empty">' +
          '<div class="et">What\'s your Instagram username?</div>' +
          '<div class="es">We use it to find the posts where you tagged @cirqle and the brand.</div>' +
          '<div style="margin-top:18px; display:flex; gap:10px; justify-content:center; flex-wrap:wrap">' +
            '<input id="handleInput" class="feed-input" placeholder="yourhandle" style="flex:0 1 240px" />' +
            '<button class="btn btn-ink" onclick="saveHandle()">Save</button>' +
          '</div>' +
        '</div>';
    }
    function saveHandle() {
      const h = window.CirqleAccount.setHandle(document.getElementById('handleInput').value);
      if (!h) { cirqleToast('Please enter a valid username'); return; }
      applyAndRender();
    }

    // ── Sign out (matches dashboard.html) ──
    function signOut() {
      localStorage.removeItem('cirqle_session');
      sessionStorage.removeItem('cirqle_session');
      window.location.href = 'index.html';
    }

    document.getElementById('refreshBtn').addEventListener('click', refresh);
    if (session) loadMentions();
  </script>
  <script src="assets/enhance.js"></script>
</body>
</html>
